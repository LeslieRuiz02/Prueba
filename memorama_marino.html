<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memorama Marino</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #1E90FF 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin: 10px 0 20px 0;
            padding: 0 10px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 95vw;
        }

        .card {
            width: 75px;
            height: 95px;
            perspective: 1000px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        @media (min-width: 450px) {
            .card {
                width: 90px;
                height: 110px;
            }
            .game-board {
                gap: 15px;
            }
        }

        @media (min-width: 600px) {
            .card {
                width: 120px;
                height: 150px;
            }
            h1 {
                font-size: 3.5rem;
            }
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .card.flipped .card-inner,
        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border-radius: 20px;
            border: 5px solid white;
            box-sizing: border-box;
            user-select: none;
        }

        @media (min-width: 600px) {
            .card-front,
            .card-back {
                font-size: 5rem;
            }
        }

        /* Dorso de la carta (lo que se ve antes de voltear) */
        .card-back {
            background-color: #FFB6C1;
            background-image: 
                radial-gradient(circle at 50% 50%, #FF69B4 20%, transparent 21%),
                radial-gradient(circle at 100% 100%, #FF69B4 20%, transparent 21%);
            background-size: 30px 30px;
            transform: rotateY(0deg);
        }

        /* Frente de la carta (imagen del animal) */
        .card-front {
            background-color: #f0f8ff;
            transform: rotateY(180deg);
        }

        .card.matched .card-front {
            background-color: #98FB98; /* Verde claro vibrante al encontrar par */
            border-color: #32CD32;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.15); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        button.action-btn {
            margin-top: 25px;
            margin-bottom: 20px;
            padding: 15px 35px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background-color: #FF6347;
            border: 4px solid #FF4500;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 6px 0 #CD5C5C, 0 10px 15px rgba(0,0,0,0.2);
            transition: all 0.1s;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #CD5C5C, 0 2px 5px rgba(0,0,0,0.2);
        }

        .setup-container {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 6px solid #FFD700;
            margin-bottom: 20px;
        }

        .setup-container h2 {
            color: #FF4500;
            margin-top: 0;
            font-size: 2rem;
        }

        .setup-container label {
            display: block;
            font-size: 1.2rem;
            margin-top: 15px;
            font-weight: bold;
            color: #1E90FF;
            text-align: left;
        }

        .setup-container input, .setup-container select {
            width: 100%;
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 10px;
            border: 3px solid #87CEEB;
            margin-top: 5px;
            box-sizing: border-box;
            font-family: inherit;
            color: #333;
        }
        
        #game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            gap: 15px;
        }

        .player-score {
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border: 4px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            flex: 1;
        }

        .player-score.active-turn {
            border-color: #32CD32;
            background: #f0fff0;
            transform: scale(1.05);
            box-shadow: 0 0 15px #32CD32;
        }

        .congratulations {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #FF4500;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            display: none;
            z-index: 100;
            border: 8px dashed #32CD32;
            width: 90%;
            max-width: 450px;
        }

        .congratulations h2 {
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            overflow: hidden;
        }

        .leaderboard-table th {
            background: #FFD700;
            color: #333;
            padding: 12px;
            border-bottom: 3px solid #FF8C00;
        }

        .leaderboard-table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        
        .leaderboard-table tr:last-child td {
            border-bottom: none;
        }

        .winner-text {
            font-size: 1.8rem;
            color: #1E90FF;
            animation: pulseText 1s infinite alternate;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        @keyframes pulseText {
            0% { transform: scale(1); text-shadow: 0 0 5px rgba(30,144,255,0.5); }
            100% { transform: scale(1.08); text-shadow: 0 0 15px rgba(30,144,255,0.9); }
        }

        .congratulations.show {
            display: block;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            70% { transform: translate(-50%, -50%) scale(0.9); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
    </style>
</head>
<body>

    <h1>Memorama Marino 🌊</h1>
    
    <div id="setup-screen" class="setup-container">
        <h2>¡Vamos a Jugar!</h2>
        <label for="p1-name">Jugador 1:</label>
        <input type="text" id="p1-name" placeholder="Nombre Jugador 1" maxlength="15" value="Jugador 1">
        
        <label for="p2-name">Jugador 2:</label>
        <input type="text" id="p2-name" placeholder="Nombre Jugador 2" maxlength="15" value="Jugador 2">
        
        <label for="difficulty">Nivel:</label>
        <select id="difficulty">
            <option value="6">Fácil (6 cartas)</option>
            <option value="12" selected>Medio (12 cartas)</option>
            <option value="20">Difícil (20 cartas)</option>
        </select>
        
        <button class="action-btn" onclick="initGame()">¡Empezar!</button>
    </div>

    <div id="game-area" style="display: none;">
        <div class="scoreboard" id="scoreboard">
            <div class="player-score" id="score-p1">
                <span class="player-name" id="name-p1">P1</span>: <span id="points-p1">0</span>
            </div>
            <div class="player-score" id="score-p2">
                <span class="player-name" id="name-p2">P2</span>: <span id="points-p2">0</span>
            </div>
        </div>

        <div class="game-board" id="board">
            <!-- Las cartas se generan dinámicamente aquí -->
        </div>
        <button class="action-btn" onclick="returnToSetup()">¡Cambiar Juego!</button>
    </div>

    <div class="congratulations" id="congrats">
        <h2>¡Juego Terminado! 🎉</h2>
        <div class="leaderboard">
            <table class="leaderboard-table">
                <tr>
                    <th>Jugador</th>
                    <th>Puntos</th>
                </tr>
                <tr id="lb-row-1">
                    <td id="lb-name-1">P1</td>
                    <td id="lb-points-1">0</td>
                </tr>
                <tr id="lb-row-2">
                    <td id="lb-name-2">P2</td>
                    <td id="lb-points-2">0</td>
                </tr>
            </table>
            <h3 id="winner-text" class="winner-text">¡Ganador!</h3>
        </div>
        <button class="action-btn" onclick="returnToSetup()">Volver al Menú</button>
    </div>

    <script>
        const animalesPool = [
            { id: 'ballena', symbol: '🐳' },
            { id: 'delfin', symbol: '🐬' },
            { id: 'pulpo', symbol: '🐙' },
            { id: 'tortuga', symbol: '🐢' },
            { id: 'cangrejo', symbol: '🦀' },
            { id: 'estrella', symbol: '⭐' },
            { id: 'tiburon', symbol: '🦈' },
            { id: 'pezglobo', symbol: '🐡' },
            { id: 'calamar', symbol: '🦑' },
            { id: 'foca', symbol: '🦭' }
        ];

        let animalesActivos = [];
        let cartasVolteadas = [];
        let paresEncontrados = 0;
        let tableroBloqueado = false;
        
        let p1Name = "Jugador 1";
        let p2Name = "Jugador 2";
        let scoreP1 = 0;
        let scoreP2 = 0;
        let currentTurn = 1; // 1 o 2
        let paresTotales = 6;
        
        let audioCtx;

        // Iniciar el contexto de audio solo tras la primera interacción
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if(audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Sonido alegre de acierto (arpegio mayor)
        function playSuccessSound() {
            try {
                initAudio();
                const playNote = (frequency, startTime, duration) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'triangle'; 
                    osc.frequency.value = frequency;
                    
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.3, startTime + duration * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                };

                const now = audioCtx.currentTime;
                playNote(523.25, now, 0.4);       // Do
                playNote(659.25, now + 0.15, 0.4); // Mi
                playNote(783.99, now + 0.3, 0.4);  // Sol
                playNote(1046.50, now + 0.45, 0.6); // Do (agudo)
            } catch (e) { console.log(e); }
        }

        // Sonido de victoria final
        function playWinSound() {
            try {
                initAudio();
                const playNote = (frequency, startTime, duration) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = frequency;
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.3, startTime + duration * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                };
                const now = audioCtx.currentTime;
                playNote(440.00, now, 0.3);
                playNote(554.37, now + 0.2, 0.3);
                playNote(659.25, now + 0.4, 0.3);
                playNote(880.00, now + 0.6, 1.0);
            } catch (e) { console.log(e); }
        }

        // Sonidito suave al voltear carta
        function playFlipSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e){}
        }

        function mezclar(array) {
            let actual = array.length, aleatorio;
            while (actual !== 0) {
                aleatorio = Math.floor(Math.random() * actual);
                actual--;
                [array[actual], array[aleatorio]] = [array[aleatorio], array[actual]];
            }
            return array;
        }

        function generarTablero() {
            const tablero = document.getElementById('board');
            tablero.innerHTML = '';
            
            // Seleccionar n pares al azar del pool
            let poolMezclado = mezclar([...animalesPool]);
            animalesActivos = poolMezclado.slice(0, paresTotales);

            // Duplicar los animales para formar los pares
            const mazoCartas = [...animalesActivos, ...animalesActivos];
            mezclar(mazoCartas);

            mazoCartas.forEach((animal) => {
                const elementoCarta = document.createElement('div');
                elementoCarta.classList.add('card');
                elementoCarta.dataset.animal = animal.id;

                elementoCarta.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back"></div>
                        <div class="card-front">${animal.symbol}</div>
                    </div>
                `;

                elementoCarta.addEventListener('click', voltearCarta);
                tablero.appendChild(elementoCarta);
            });
        }

        function voltearCarta() {
            initAudio(); // Garantizar que el sonido esté listo

            if (tableroBloqueado) return;
            if (this.classList.contains('flipped') || this.classList.contains('matched')) return;

            playFlipSound();
            this.classList.add('flipped');
            cartasVolteadas.push(this);

            if (cartasVolteadas.length === 2) {
                verificarPar();
            }
        }

        function verificarPar() {
            tableroBloqueado = true;
            const [carta1, carta2] = cartasVolteadas;
            const parEncontrado = carta1.dataset.animal === carta2.dataset.animal;

            if (parEncontrado) {
                setTimeout(() => {
                    carta1.classList.add('matched');
                    carta2.classList.add('matched');
                    playSuccessSound();
                    paresEncontrados++;

                    if(currentTurn === 1) scoreP1++;
                    else scoreP2++;
                    updateScores();

                    reiniciarTurno();
                    verificarVictoria();
                }, 500); // Esperar que termine la animación de voltear
            } else {
                // Si se equivocan, voltear de regreso
                setTimeout(() => {
                    carta1.classList.remove('flipped');
                    carta2.classList.remove('flipped');
                    
                    // Lógica de fallo: cambia turno
                    currentTurn = currentTurn === 1 ? 2 : 1;
                    updateTurnUI();

                    reiniciarTurno();
                }, 1200); // Dar suficiente tiempo para que el niño vea ambas cartas
            }
        }

        function reiniciarTurno() {
            cartasVolteadas = [];
            tableroBloqueado = false;
        }

        function verificarVictoria() {
            if (paresEncontrados === paresTotales) {
                setTimeout(() => {
                    playWinSound();
                    document.getElementById('congrats').classList.add('show');
                    
                    document.getElementById('lb-name-1').innerText = p1Name;
                    document.getElementById('lb-points-1').innerText = scoreP1;
                    document.getElementById('lb-name-2').innerText = p2Name;
                    document.getElementById('lb-points-2').innerText = scoreP2;
                    
                    const winnerText = document.getElementById('winner-text');
                    const row1 = document.getElementById('lb-row-1');
                    const row2 = document.getElementById('lb-row-2');
                    
                    row1.style.fontWeight = 'normal';
                    row1.style.backgroundColor = 'transparent';
                    row2.style.fontWeight = 'normal';
                    row2.style.backgroundColor = 'transparent';

                    if (scoreP1 > scoreP2) {
                        winnerText.innerText = '¡Ganador: ' + p1Name + '! 🏆';
                        row1.style.fontWeight = 'bold';
                        row1.style.backgroundColor = '#98FB98';
                    } else if (scoreP2 > scoreP1) {
                        winnerText.innerText = '¡Ganador: ' + p2Name + '! 🏆';
                        row2.style.fontWeight = 'bold';
                        row2.style.backgroundColor = '#98FB98';
                    } else {
                        winnerText.innerText = '¡Empate! 🤝';
                        row1.style.fontWeight = 'bold';
                        row2.style.fontWeight = 'bold';
                        row1.style.backgroundColor = '#FFE4B5';
                        row2.style.backgroundColor = '#FFE4B5';
                    }

                }, 600);
            }
        }

        function updateScores() {
            document.getElementById('points-p1').innerText = scoreP1;
            document.getElementById('points-p2').innerText = scoreP2;
        }

        function updateTurnUI() {
            const score1El = document.getElementById('score-p1');
            const score2El = document.getElementById('score-p2');
            
            if (currentTurn === 1) {
                score1El.classList.add('active-turn');
                score2El.classList.remove('active-turn');
            } else {
                score1El.classList.remove('active-turn');
                score2El.classList.add('active-turn');
            }
        }

        function initGame() {
            const inputP1 = document.getElementById('p1-name').value.trim();
            const inputP2 = document.getElementById('p2-name').value.trim();
            p1Name = inputP1 || "Jugador 1";
            p2Name = inputP2 || "Jugador 2";
            
            document.getElementById('name-p1').innerText = p1Name;
            document.getElementById('name-p2').innerText = p2Name;

            const diffVal = parseInt(document.getElementById('difficulty').value);
            paresTotales = diffVal / 2;

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            
            const board = document.getElementById('board');
            if(diffVal === 6) {
                board.style.gridTemplateColumns = 'repeat(3, 1fr)';
                board.style.gridTemplateRows = 'repeat(2, 1fr)';
            } else if(diffVal === 12) {
                board.style.gridTemplateColumns = 'repeat(4, 1fr)';
                board.style.gridTemplateRows = 'repeat(3, 1fr)';
            } else if(diffVal === 20) {
                board.style.gridTemplateColumns = 'repeat(5, 1fr)';
                board.style.gridTemplateRows = 'repeat(4, 1fr)';
            }

            resetGame();
        }

        function resetGame() {
            scoreP1 = 0;
            scoreP2 = 0;
            updateScores();
            
            currentTurn = 1;
            updateTurnUI();

            paresEncontrados = 0;
            cartasVolteadas = [];
            tableroBloqueado = false;
            document.getElementById('congrats').classList.remove('show');
            
            generarTablero();
        }

        function returnToSetup() {
            document.getElementById('congrats').classList.remove('show');
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'block';
        }

        // Ya no iniciamos el tablero automáticamente, esperamos a que el usuario le de clic a ¡Empezar!
    </script>
</body>
</html>
